name: Update Profile Build Logs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Grants complete workflow engine permissions to rewrite the repository contents
    permissions:
      contents: write
      statuses: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Dynamic Server Logs
        run: node .github/scripts/generate-logs.js

      - name: Commit and Push Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "system-bot: synchronized live infrastructure build logs [skip ci]"
